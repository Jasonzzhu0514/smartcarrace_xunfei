#Description:
#  全局代价地图参数配置文件,各参数的意义如下：
#  global_frame:在全局代价地图中的全局坐标系;
#  robot_base_frame:机器人的基坐标系;
#0.2quanju  inflation_layer
global_costmap: 
  global_frame: map #全局代价地图需要在哪个坐标系下运行;
  robot_base_frame: base_link #在全局代价地图中机器人本体的基坐标系。
  update_frequency: 0.1 #全局代价地图更新频率，一般全局代价地图更新频率设置的比较小
  publish_frequency: 0.1 #全局代价地图的发布频率，只用于Rviz可视化，这个参数没必要太大
  static_map: true #配置是否使用map_server提供的地图来初始化，因为全局地图都是静态的，一般都设置为true
  # resolution: 0.05 #栅格地图的分辨率，该分辨率可以从加载的地图相对应的配置文件中获取到

  rolling_window: false #是否在机器人移动过程中需要滚动窗口，始终保持机器人在当前窗口中心位置
  transform_tolerance: 1.0 #坐标系间的转换可以忍受的最大延时，当计算机计算资源有限时，可能会在终端中报错“[WARN]
  track_unknown_space: true #
  plugins:
    - {name: static_layer,    type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
