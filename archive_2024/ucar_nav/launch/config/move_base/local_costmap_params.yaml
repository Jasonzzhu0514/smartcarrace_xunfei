#Description:
#  本地代价地图需要配置的参数，各参数意义如下:
#  global_frame:在本地代价地图中的全局坐标系;
#  robot_base_frame:机器人本体的基坐标系;
#0.1
local_costmap:
  global_frame: map #里程计坐标系 map
  robot_base_frame: base_link #机器人坐标系
  update_frequency: 1 #代价地图更新频率 1
  publish_frequency: 1  #代价地图的发布频率
  static_map: False #不需要静态地图，可以提升导航效果
  rolling_window: true #是否使用动态窗口，默认为false，在静态的全局地图中，地图不会变化
  width: 1.5 # 局部地图宽度 单位是 m
  height: 1.5 # 局部地图高度 单位是 m
  resolution: 0.05  # 局部地图分辨率 单位是 m，一般与静态地图分辨率保持一致
  transform_tolerance: 0.5  #10 等待坐标变换发布信息的超时时间 
  plugins:
    - {name: static_layer,    type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
